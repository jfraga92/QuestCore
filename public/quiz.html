<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>A Tua Rota</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/theme.css" />
    <style>
      .app {
        max-width: var(--maxw);
        margin: 0 auto;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        padding: 20px 20px calc(28px + env(safe-area-inset-bottom));
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 0 14px;
      }
      .screen { flex: 1; display: flex; flex-direction: column; }
      .hidden { display: none !important; }

      /* --- Capa --- */
      .cover { justify-content: center; text-align: center; gap: 22px; animation: fadeIn 0.6s ease both; }
      .cover h1 {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: clamp(2.8rem, 15vw, 4.6rem);
        line-height: 0.92;
        letter-spacing: -0.02em;
        margin: 0;
        background: linear-gradient(180deg, #fff 30%, var(--lime));
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .cover p { color: var(--muted); font-size: 1.05rem; line-height: 1.55; margin: 0; }
      .cover p strong { color: var(--text); }
      .cover .note {
        font-family: var(--font-mono);
        font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--muted-2);
      }
      .cover .cta { margin-top: 6px; }

      /* --- Nome --- */
      .name-screen { justify-content: center; gap: 18px; animation: fadeIn 0.5s ease both; }
      .name-screen h2 {
        font-family: var(--font-display); font-weight: 700;
        font-size: 2rem; margin: 0; letter-spacing: -0.01em;
      }
      .name-screen input {
        width: 100%; padding: 18px 20px; font-size: 1.15rem; font-family: var(--font-body);
        color: var(--text); background: var(--bg-1);
        border: 1.5px solid var(--line-soft); border-radius: 14px; outline: none;
        transition: border-color 0.15s;
      }
      .name-screen input:focus { border-color: var(--lime); }
      .name-hint { color: var(--muted-2); font-size: 0.85rem; }

      /* --- Progresso --- */
      .progress { display: flex; align-items: center; gap: 12px; }
      .progress .bar { flex: 1; height: 4px; background: var(--line-soft); border-radius: 99px; overflow: hidden; }
      .progress .bar > span { display: block; height: 100%; background: var(--lime); border-radius: 99px; transition: width 0.4s ease; }

      /* --- Pergunta --- */
      .q { gap: 18px; padding-top: 8px; animation: fadeUp 0.4s ease both; }
      .sinal {
        position: relative;
        background: linear-gradient(140deg, rgba(166,206,57,0.10), rgba(79,216,235,0.04));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 20px 20px 22px;
      }
      .sinal::before {
        content: ""; position: absolute; left: 0; top: 14px; bottom: 14px; width: 3px;
        background: var(--lime); border-radius: 99px;
      }
      .sinal .k { color: var(--lime); }
      .sinal p { margin: 8px 0 0; font-size: 1.06rem; line-height: 1.5; color: #dbe7d2; }
      .pergunta { font-family: var(--font-display); font-weight: 600; font-size: 1.35rem; line-height: 1.3; margin: 2px 0; }

      .opts { display: flex; flex-direction: column; gap: 10px; }
      .opt {
        text-align: left; width: 100%;
        background: var(--bg-1); color: var(--text);
        border: 1.5px solid var(--line-soft); border-radius: 14px;
        padding: 16px 18px; font-size: 1.02rem; line-height: 1.35; font-family: var(--font-body);
        cursor: pointer; transition: border-color 0.15s, background 0.15s, opacity 0.25s, transform 0.1s;
        display: flex; align-items: center; gap: 14px;
      }
      .opt .dot {
        flex: 0 0 auto; width: 22px; height: 22px; border-radius: 50%;
        border: 2px solid var(--muted-2); transition: all 0.15s;
      }
      .opt:hover { border-color: var(--lime); }
      .opt:active { transform: scale(0.99); }
      .opts.answered .opt { opacity: 0.32; pointer-events: none; }
      .opts.answered .opt.sel { opacity: 1; border-color: var(--lime); background: rgba(166,206,57,0.08); }
      .opt.sel .dot { border-color: var(--lime); background: var(--lime); box-shadow: 0 0 0 4px rgba(166,206,57,0.18); }

      /* --- Painel eco + facto --- */
      .panel {
        margin-top: 4px; border-radius: var(--radius);
        border: 1px solid var(--line); overflow: hidden;
        animation: fadeUp 0.35s ease both;
      }
      .eco { padding: 18px 20px; background: rgba(166,206,57,0.06); }
      .eco .k { color: var(--lime); }
      .eco p { margin: 6px 0 0; font-size: 1.08rem; line-height: 1.45; }
      .facto { padding: 16px 20px; background: var(--bg-2); border-top: 1px dashed var(--line); }
      .facto .tag {
        display: inline-block; font-family: var(--font-mono); font-size: 0.66rem;
        letter-spacing: 0.16em; color: var(--cyan);
        border: 1px solid rgba(79,216,235,0.4); border-radius: 6px; padding: 3px 8px;
      }
      .facto p { margin: 8px 0 0; font-size: 0.96rem; line-height: 1.45; color: var(--slate); }
      .continue { margin-top: 16px; }
      .continue .btn { width: 100%; }

      /* --- Ecrã final --- */
      .final { gap: 26px; padding-top: 8px; animation: fadeIn 0.6s ease both; }
      .result-head { text-align: center; }
      .result-head .sym { font-size: 2.6rem; line-height: 1; }
      .result-head .pname {
        font-family: var(--font-display); font-weight: 800;
        font-size: clamp(2.4rem, 12vw, 3.4rem); margin: 8px 0 0; letter-spacing: -0.01em;
      }
      .result-head .pdesc { color: var(--muted); font-size: 1.05rem; line-height: 1.5; margin: 12px auto 0; max-width: 460px; }

      .block-title { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

      .map-wrap { padding: 18px; }
      .map { width: 100%; height: auto; display: block; }

      .axes .axis { margin-bottom: 14px; }
      .axes .axis:last-child { margin-bottom: 0; }
      .axes .axis .row { display: flex; justify-content: space-between; font-size: 0.95rem; margin-bottom: 7px; }
      .axes .axis .row .v { font-family: var(--font-mono); color: var(--lime); }
      .axes .track { height: 8px; background: var(--line-soft); border-radius: 99px; overflow: hidden; }
      .axes .track > span { display: block; height: 100%; border-radius: 99px; transition: width 0.8s cubic-bezier(.2,.7,.2,1); }

      .swot { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .swot .quad { padding: 16px; border-radius: 14px; border: 1px solid var(--line-soft); background: var(--bg-1); }
      .swot .quad h4 { margin: 0 0 10px; font-size: 0.82rem; font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }
      .swot .quad.s h4 { color: var(--lime); }
      .swot .quad.w h4 { color: var(--amber); }
      .swot .quad.o h4 { color: var(--cyan); }
      .swot .quad.t h4 { color: #ff7a7a; }
      .swot .quad ul { margin: 0; padding-left: 16px; display: flex; flex-direction: column; gap: 8px; }
      .swot .quad li { font-size: 0.9rem; line-height: 1.35; color: #d3dde8; }
      @media (max-width: 460px) { .swot { grid-template-columns: 1fr; } }

      .next-step { padding: 20px; border-radius: var(--radius); border: 1px solid var(--line); background: linear-gradient(140deg, rgba(166,206,57,0.10), transparent); }
      .next-step p { margin: 8px 0 0; font-size: 1.06rem; line-height: 1.5; }
      .next-step p strong { color: var(--lime); font-weight: 600; }

      .closing { text-align: center; font-family: var(--font-display); font-weight: 600; font-size: 1.3rem; line-height: 1.35; padding: 6px 0; }
      .closing strong { color: var(--lime); }

      .final-actions { display: flex; flex-direction: column; gap: 10px; }
      .final-actions .btn { width: 100%; }
      .row-actions { display: flex; gap: 10px; }
      .row-actions .btn { flex: 1; }

      /* --- Modo Sala --- */
      .sala {
        position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px; text-align: center;
        animation: fadeIn 0.4s ease both; cursor: pointer;
      }
      .sala .sym { font-size: 30vw; line-height: 1; }
      .sala .pname { font-family: var(--font-display); font-weight: 800; font-size: 12vw; letter-spacing: -0.01em; }
      .sala .hint { font-family: var(--font-mono); font-size: 0.8rem; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.7; }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">
          <img src="/logo.webp" alt="inCentea Core" />
          <span class="brand-txt">A Tua Rota</span>
        </div>
        <div class="label" id="counter"></div>
      </div>

      <div id="stage" class="screen"></div>
    </div>

    <div id="sala" class="sala hidden"></div>

    <script src="/quiz-data.js"></script>
    <script src="/quiz.js"></script>
  </body>
</html>
