<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Tua Rota · Painel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/theme.css" />
    <style>
      .dash { max-width: 1180px; margin: 0 auto; padding: 24px 20px 60px; }
      .head { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 26px; animation: fadeUp 0.5s ease both; }
      .head h1 { font-family: var(--font-display); font-weight: 900; font-size: 1.8rem; margin: 0; letter-spacing: -0.01em; color: var(--ink); }
      .head .sub { color: var(--muted); font-size: 0.92rem; margin-top: 2px; }
      .head .tools { display: flex; align-items: center; gap: 10px; }
      .chip { font-family: var(--font-mono); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.06em; color: var(--muted); border: 1px solid var(--line-soft); padding: 8px 12px; border-radius: 999px; background: #fff; }
      .chip.live { color: var(--brand); border-color: var(--line); }
      .chip.live::before { content: "●"; margin-right: 6px; animation: fadeIn 1s ease-in-out infinite alternate; }
      .icon-btn { background: #fff; border: 1px solid var(--line-soft); color: var(--ink); border-radius: 10px; padding: 9px 14px; cursor: pointer; font-family: var(--font-body); font-weight: 600; font-size: 0.9rem; box-shadow: var(--shadow-sm); transition: border-color 0.15s, transform 0.12s; }
      .icon-btn:hover { border-color: var(--brand); transform: translateY(-1px); }

      .grid { display: grid; gap: 16px; }
      .kpis { grid-template-columns: repeat(5, 1fr); }
      @media (max-width: 820px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
      .kpi { padding: 18px; animation: riseStagger 0.5s ease both; }
      .kpi:nth-child(2){animation-delay:.05s} .kpi:nth-child(3){animation-delay:.1s} .kpi:nth-child(4){animation-delay:.15s} .kpi:nth-child(5){animation-delay:.2s}
      .kpi .n { font-family: var(--font-display); font-weight: 900; font-size: 2.5rem; line-height: 1; }
      .kpi .t { font-family: var(--font-mono); font-weight: 700; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }
      .kpi .pct { font-size: 0.82rem; color: var(--muted-2); margin-top: 2px; font-weight: 600; }

      .cols { grid-template-columns: 1.1fr 0.9fr; align-items: start; }
      @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } }
      .panel-c { padding: 20px; }
      .panel-c h3 { font-family: var(--font-mono); font-weight: 700; font-size: 0.74rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--brand); margin: 0 0 16px; }

      .map { width: 100%; height: auto; display: block; }

      .distro { display: flex; flex-direction: column; gap: 14px; }
      .distro .r .top { display: flex; justify-content: space-between; font-size: 0.92rem; margin-bottom: 6px; font-weight: 600; color: var(--ink); }
      .distro .r .top .name { display: flex; align-items: center; gap: 8px; }
      .distro .r .top .val { font-family: var(--font-mono); font-weight: 700; color: var(--muted); }
      .distro .track { height: 12px; background: var(--line-soft); border-radius: 99px; overflow: hidden; }
      .distro .track > span { display: block; height: 100%; border-radius: 99px; width: 0; transition: width 0.9s cubic-bezier(.2,.8,.2,1); }

      .avg { display: flex; gap: 22px; margin-top: 4px; }
      .avg .a { flex: 1; }
      .avg .a .lab { font-size: 0.88rem; color: var(--ink); margin-bottom: 6px; display: flex; justify-content: space-between; font-weight: 600; }
      .avg .a .lab b { font-family: var(--font-mono); font-weight: 700; color: var(--brand); }
      .avg .track { height: 10px; background: var(--line-soft); border-radius: 99px; overflow: hidden; }
      .avg .track > span { display: block; height: 100%; border-radius: 99px; width: 0; transition: width 0.9s cubic-bezier(.2,.8,.2,1); }

      .questions { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
      @media (max-width: 760px) { .questions { grid-template-columns: 1fr; } }
      .qcard { padding: 16px; }
      .qcard .qn { font-family: var(--font-mono); font-weight: 700; font-size: 0.68rem; letter-spacing: 0.08em; color: var(--brand); }
      .qcard .qt { font-size: 0.96rem; font-weight: 700; margin: 6px 0 12px; line-height: 1.3; color: var(--ink); }
      .qcard .obar { display: flex; flex-direction: column; gap: 8px; }
      .qcard .obar .o { font-size: 0.84rem; color: var(--text); }
      .qcard .obar .o .l { display: flex; justify-content: space-between; margin-bottom: 4px; gap: 10px; }
      .qcard .obar .o .l .c { font-family: var(--font-mono); font-weight: 700; color: var(--muted); white-space: nowrap; }
      .qcard .obar .o .tk { height: 7px; background: var(--line-soft); border-radius: 99px; overflow: hidden; }
      .qcard .obar .o .tk > span { display: block; height: 100%; background: linear-gradient(90deg, var(--brand-2), var(--brand)); border-radius: 99px; }

      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 11px 10px; font-size: 0.92rem; border-bottom: 1px solid var(--line-soft); color: var(--text); }
      th { font-family: var(--font-mono); font-weight: 700; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
      td.nm { font-weight: 600; color: var(--ink); }
      td .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--line-soft); }
      .mono { font-family: var(--font-mono); font-weight: 600; color: var(--muted); }

      .section-title { font-family: var(--font-mono); font-weight: 700; font-size: 0.74rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--brand); margin: 30px 0 6px; }

      .gate { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .gate .box { width: 100%; max-width: 380px; padding: 32px; text-align: center; animation: popIn 0.5s ease both; }
      .gate h2 { font-family: var(--font-display); font-weight: 700; margin: 14px 0 6px; color: var(--ink); }
      .gate p { color: var(--muted); font-size: 0.9rem; margin: 0 0 20px; }
      .gate input { width: 100%; padding: 14px 16px; background: #fff; border: 1.5px solid var(--line-soft); border-radius: 12px; color: var(--ink); font-family: var(--font-mono); font-size: 0.95rem; outline: none; margin-bottom: 12px; }
      .gate input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(1,104,255,0.12); }
      .gate .err { color: #ef4444; font-size: 0.85rem; min-height: 20px; margin-bottom: 8px; font-weight: 600; }
      .empty { text-align: center; color: var(--muted); padding: 40px; }

      /* ---- Modo projeção (PC / ecrã grande, landscape) ---- */
      @media (min-width: 1200px) {
        .dash { max-width: min(1720px, 97vw); padding: 26px 40px 60px; }
        .head h1 { font-size: 2.3rem; }
        .head .sub { font-size: 1.05rem; }
        .chip { font-size: 0.82rem; padding: 10px 15px; }
        .icon-btn { font-size: 1rem; padding: 11px 18px; }

        .kpis { gap: 20px; }
        .kpi { padding: 22px 24px; }
        .kpi .n { font-size: 3.8rem; }
        .kpi .t { font-size: 0.82rem; }
        .kpi .pct { font-size: 0.95rem; }

        /* Primeira dobra: KPIs + mapa + distribuição ocupam ~um ecrã */
        .cols { grid-template-columns: 1.15fr 1fr; gap: 22px; }
        .panel-c { padding: 26px; }
        .panel-c h3 { font-size: 0.86rem; margin-bottom: 20px; }
        .map { max-height: 58vh; width: auto; margin: 0 auto; }

        .distro { gap: 20px; }
        .distro .r .top { font-size: 1.12rem; margin-bottom: 8px; }
        .distro .track { height: 18px; }
        .distro .r .top .sym { font-size: 1.2rem; }

        .avg .a .lab { font-size: 1.05rem; }
        .avg .track { height: 15px; }

        .section-title { font-size: 0.86rem; margin: 40px 0 8px; }
        .questions { grid-template-columns: repeat(5, 1fr); gap: 18px; }
        .qcard { padding: 18px; }
        .qcard .qt { font-size: 1rem; }
        th, td { font-size: 1.02rem; padding: 14px 12px; }
      }

      @media (min-width: 1200px) and (max-width: 1500px) {
        .questions { grid-template-columns: repeat(3, 1fr); }
      }

      :fullscreen .dash, :-webkit-full-screen .dash { padding-top: 30px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/quiz-data.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
