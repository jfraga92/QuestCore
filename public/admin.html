<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Tua Rota · Painel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/theme.css" />
    <style>
      .dash { max-width: 1120px; margin: 0 auto; padding: 24px 20px 60px; }
      .head { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 26px; }
      .head h1 { font-family: var(--font-display); font-weight: 800; font-size: 1.7rem; margin: 0; letter-spacing: -0.01em; }
      .head .sub { color: var(--muted); font-size: 0.9rem; margin-top: 2px; }
      .head .tools { display: flex; align-items: center; gap: 10px; }
      .chip { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.08em; color: var(--muted); border: 1px solid var(--line-soft); padding: 8px 12px; border-radius: 999px; }
      .chip.live { color: var(--lime); border-color: var(--line); }
      .icon-btn { background: var(--bg-1); border: 1px solid var(--line-soft); color: var(--text); border-radius: 10px; padding: 9px 14px; cursor: pointer; font-family: var(--font-body); font-size: 0.9rem; }
      .icon-btn:hover { border-color: var(--lime); }

      .grid { display: grid; gap: 16px; }
      .kpis { grid-template-columns: repeat(5, 1fr); }
      @media (max-width: 820px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
      .kpi { padding: 18px; }
      .kpi .n { font-family: var(--font-display); font-weight: 800; font-size: 2.4rem; line-height: 1; }
      .kpi .t { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }
      .kpi .pct { font-size: 0.8rem; color: var(--muted-2); margin-top: 2px; }

      .cols { grid-template-columns: 1.1fr 0.9fr; align-items: start; }
      @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } }
      .panel-c { padding: 20px; }
      .panel-c h3 { font-family: var(--font-mono); font-size: 0.74rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin: 0 0 16px; }

      .map { width: 100%; height: auto; display: block; }

      .distro { display: flex; flex-direction: column; gap: 14px; }
      .distro .r .top { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 6px; }
      .distro .r .top .name { display: flex; align-items: center; gap: 8px; }
      .distro .r .top .sym { font-size: 0.95rem; }
      .distro .r .top .val { font-family: var(--font-mono); color: var(--muted); }
      .distro .track { height: 10px; background: var(--line-soft); border-radius: 99px; overflow: hidden; }
      .distro .track > span { display: block; height: 100%; border-radius: 99px; transition: width 0.6s ease; }

      .avg { display: flex; gap: 22px; margin-top: 4px; }
      .avg .a { flex: 1; }
      .avg .a .lab { font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
      .avg .a .lab b { font-family: var(--font-mono); color: var(--lime); }
      .avg .track { height: 8px; background: var(--line-soft); border-radius: 99px; overflow: hidden; }
      .avg .track > span { display: block; height: 100%; border-radius: 99px; }

      .questions { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
      @media (max-width: 760px) { .questions { grid-template-columns: 1fr; } }
      .qcard { padding: 16px; }
      .qcard .qn { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em; color: var(--cyan); }
      .qcard .qt { font-size: 0.95rem; font-weight: 600; margin: 6px 0 12px; line-height: 1.3; }
      .qcard .obar { display: flex; flex-direction: column; gap: 8px; }
      .qcard .obar .o { font-size: 0.82rem; color: var(--slate); }
      .qcard .obar .o .l { display: flex; justify-content: space-between; margin-bottom: 4px; }
      .qcard .obar .o .l .c { font-family: var(--font-mono); color: var(--muted); }
      .qcard .obar .o .tk { height: 6px; background: var(--line-soft); border-radius: 99px; overflow: hidden; }
      .qcard .obar .o .tk > span { display: block; height: 100%; background: linear-gradient(90deg, var(--lime), var(--cyan)); border-radius: 99px; }

      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 11px 10px; font-size: 0.9rem; border-bottom: 1px solid var(--line-soft); }
      th { font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
      td .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; padding: 3px 9px; border-radius: 99px; border: 1px solid var(--line-soft); }
      .mono { font-family: var(--font-mono); color: var(--muted); }

      .section-title { font-family: var(--font-mono); font-size: 0.74rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin: 30px 0 6px; }

      /* Gate */
      .gate { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .gate .box { width: 100%; max-width: 380px; padding: 30px; text-align: center; }
      .gate h2 { font-family: var(--font-display); font-weight: 700; margin: 14px 0 6px; }
      .gate p { color: var(--muted); font-size: 0.9rem; margin: 0 0 20px; }
      .gate input { width: 100%; padding: 14px 16px; background: var(--bg-1); border: 1.5px solid var(--line-soft); border-radius: 12px; color: var(--text); font-family: var(--font-mono); font-size: 0.95rem; outline: none; margin-bottom: 12px; }
      .gate input:focus { border-color: var(--lime); }
      .gate .err { color: #ff7a7a; font-size: 0.85rem; min-height: 20px; margin-bottom: 8px; }
      .empty { text-align: center; color: var(--muted); padding: 40px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="/quiz-data.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
