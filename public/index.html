<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Tua Rota · inCentea Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/theme.css" />
    <style>
      .wrap {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 34px;
        padding: 40px 24px;
        text-align: center;
      }
      .top { animation: fadeIn 0.8s ease both; }
      .hero h1 {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: clamp(3rem, 11vw, 7rem);
        line-height: 0.94;
        letter-spacing: -0.02em;
        margin: 0;
        background: linear-gradient(180deg, #fff 25%, var(--lime));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: fadeUp 0.7s ease both;
      }
      .hero p {
        max-width: 560px;
        margin: 18px auto 0;
        color: var(--muted);
        font-size: clamp(1rem, 2.4vw, 1.2rem);
        line-height: 1.5;
        animation: fadeUp 0.7s ease 0.1s both;
      }
      .hero .accent { color: var(--lime); }

      .qr-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 26px;
        background: #f5f8ee;
        border-radius: 24px;
        box-shadow: 0 30px 80px -30px rgba(166, 206, 57, 0.5);
        animation: fadeUp 0.7s ease 0.2s both;
      }
      .qr-card .qr {
        width: min(46vw, 300px);
        height: min(46vw, 300px);
        display: block;
      }
      .qr-card .scan {
        font-family: var(--font-mono);
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #3a4a1c;
      }
      .url {
        font-family: var(--font-mono);
        font-size: 0.9rem;
        color: var(--text);
        background: var(--bg-1);
        border: 1px solid var(--line);
        padding: 10px 18px;
        border-radius: 999px;
        animation: fadeUp 0.7s ease 0.3s both;
      }
      .steps {
        display: flex;
        gap: 26px;
        flex-wrap: wrap;
        justify-content: center;
        color: var(--muted);
        font-size: 0.92rem;
        animation: fadeUp 0.7s ease 0.35s both;
      }
      .steps b { color: var(--lime); font-family: var(--font-mono); margin-right: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top brand">
        <img src="/logo.webp" alt="inCentea Core" />
        <span class="brand-txt">inCentea Core</span>
      </div>

      <div class="hero">
        <h1>A TUA ROTA</h1>
        <p>
          10 sinais do terreno. 10 escolhas tuas. No fim, o teu lugar no mapa da
          era da <span class="accent">IA</span>.
        </p>
      </div>

      <div class="qr-card">
        <img class="qr" src="/api/qr.svg" alt="QR code para responder" />
        <span class="scan">Aponta a câmara do telemóvel</span>
      </div>

      <div class="url" id="url">a carregar…</div>

      <div class="steps">
        <span><b>01</b> Abre a câmara</span>
        <span><b>02</b> Aponta ao código</span>
        <span><b>03</b> Toca no link</span>
      </div>

      <div class="foot">A TUA ROTA · uso interno inCentea Core</div>
    </div>

    <script>
      fetch("/api/quiz-url")
        .then((r) => r.json())
        .then((d) => {
          document.getElementById("url").textContent = (d.url || "").replace(
            /^https?:\/\//,
            ""
          );
        })
        .catch(() => {
          document.getElementById("url").textContent = "";
        });
    </script>
  </body>
</html>
