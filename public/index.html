<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Tua Rota · inCentea Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/theme.css" />
    <style>
      .wrap {
        min-height: 100dvh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 30px;
        padding: 44px 24px; text-align: center; position: relative;
      }
      /* hexágonos flutuantes */
      .deco { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
      .deco .h {
        position: absolute; background: linear-gradient(135deg, rgba(46,169,255,0.16), rgba(1,104,255,0.05));
        clip-path: polygon(50% 0, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
        animation: floatY 7s ease-in-out infinite;
      }
      .deco .h1 { width: 120px; height: 132px; left: 8%; top: 18%; animation-delay: 0s; }
      .deco .h2 { width: 76px; height: 84px; right: 12%; top: 26%; animation-delay: 1.2s; }
      .deco .h3 { width: 150px; height: 165px; right: 6%; bottom: 12%; animation-delay: 0.6s; opacity: 0.7; }
      .deco .h4 { width: 60px; height: 66px; left: 14%; bottom: 18%; animation-delay: 2s; }

      .top { animation: fadeIn 0.9s ease both; }

      .hero h1 {
        font-family: var(--font-display); font-weight: 900;
        font-size: clamp(3rem, 12vw, 7.5rem); line-height: 0.92;
        letter-spacing: -0.02em; margin: 0; position: relative; display: inline-block;
        background: linear-gradient(100deg, var(--brand-deep), var(--brand) 40%, var(--brand-2));
        -webkit-background-clip: text; background-clip: text; color: transparent;
        animation: fadeUp 0.8s ease both;
      }
      .hero h1::after {
        content: ""; position: absolute; inset: 0;
        background: linear-gradient(110deg, transparent 42%, rgba(255,255,255,0.8) 50%, transparent 58%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        mix-blend-mode: overlay; animation: sheen 4s ease-in-out 0.6s infinite;
      }
      .hero p {
        max-width: 560px; margin: 20px auto 0; color: var(--muted);
        font-size: clamp(1.05rem, 2.4vw, 1.28rem); line-height: 1.55;
        animation: fadeUp 0.8s ease 0.12s both;
      }
      .hero .accent { color: var(--brand); font-weight: 700; }

      .qr-stage { position: relative; animation: popIn 0.7s ease 0.2s both; }
      .qr-stage .glow {
        position: absolute; inset: -14px; border-radius: 34px;
        border: 2px solid var(--brand); opacity: 0;
        animation: ring 2.6s ease-out infinite;
      }
      .qr-card {
        position: relative; display: flex; flex-direction: column; align-items: center; gap: 16px;
        padding: 26px; background: #fff; border-radius: 26px;
        box-shadow: var(--shadow); border: 1px solid var(--line-soft);
      }
      .qr-card .qr { width: min(46vw, 300px); height: min(46vw, 300px); display: block; }
      .qr-card .scan {
        font-family: var(--font-mono); font-weight: 700; font-size: 0.8rem;
        letter-spacing: 0.14em; text-transform: uppercase; color: var(--brand);
      }

      .url {
        font-family: var(--font-mono); font-weight: 600; font-size: 0.95rem; color: var(--ink);
        background: var(--bg-1); border: 1px solid var(--line);
        padding: 11px 20px; border-radius: 999px; animation: fadeUp 0.8s ease 0.3s both;
      }
      .steps {
        display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
        animation: fadeUp 0.8s ease 0.4s both;
      }
      .steps .s {
        display: flex; align-items: center; gap: 9px; background: #fff;
        border: 1px solid var(--line-soft); box-shadow: var(--shadow-sm);
        padding: 10px 16px; border-radius: 999px; color: var(--text); font-size: 0.92rem; font-weight: 600;
      }
      .steps .s b {
        font-family: var(--font-mono); color: #fff; background: var(--brand);
        width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center;
        font-size: 0.72rem;
      }
    </style>
  </head>
  <body>
    <div class="deco">
      <div class="h h1"></div><div class="h h2"></div>
      <div class="h h3"></div><div class="h h4"></div>
    </div>

    <div class="wrap">
      <div class="top brand">
        <img src="/logo.webp" alt="inCentea Core" />
      </div>

      <div class="hero">
        <h1>A TUA ROTA</h1>
        <p>
          10 sinais do terreno. 10 escolhas tuas. No fim, o teu lugar no mapa da
          era da <span class="accent">IA</span>.
        </p>
      </div>

      <div class="qr-stage">
        <div class="glow"></div>
        <div class="qr-card">
          <img class="qr" src="/api/qr.svg" alt="QR code para responder" />
          <span class="scan">Aponta a câmara do telemóvel</span>
        </div>
      </div>

      <div class="url" id="url">a carregar…</div>

      <div class="steps">
        <span class="s"><b>1</b> Abre a câmara</span>
        <span class="s"><b>2</b> Aponta ao código</span>
        <span class="s"><b>3</b> Toca no link</span>
      </div>

      <div class="foot">A TUA ROTA · uso interno inCentea Core</div>
    </div>

    <script>
      fetch("/api/quiz-url")
        .then((r) => r.json())
        .then((d) => {
          document.getElementById("url").textContent = (d.url || "").replace(/^https?:\/\//, "");
        })
        .catch(() => { document.getElementById("url").textContent = ""; });
    </script>
  </body>
</html>
